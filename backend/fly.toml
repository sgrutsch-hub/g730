app = "swing-doctor-api"
primary_region = "ord"  # Chicago — closest to Minnesota

[build]
  dockerfile = "Dockerfile"

[deploy]
  strategy = "rolling"

[env]
  ENVIRONMENT = "production"
  LOG_LEVEL = "info"
  PORT = "8000"
  ALLOWED_ORIGINS = "https://swing.doctor,https://www.swing.doctor"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    port = 8000
    type = "http"
    interval = "30s"
    timeout = "5s"
    path = "/health"

[mounts]
  source = "swing_doctor_data"
  destination = "/data"
